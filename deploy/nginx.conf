# =============================================================================
# TrueSight — Configuration Nginx (reverse proxy TLS)
# -----------------------------------------------------------------------------
# Monté dans le conteneur nginx sur /etc/nginx/conf.d/default.conf (lecture seule)
# via docker-compose.yml.
#
# Rôle :
#   - Terminaison TLS (HTTPS) avec certificat Let's Encrypt.
#   - Redirection systématique HTTP (80) -> HTTPS (443).
#   - Reverse proxy vers l'application Flask (service « web », port 8000).
#   - En-tête HSTS, taille de corps adaptée au stdout volumineux des commandes.
#
# Remplacez « parc.medicofi.fr » par votre domaine réel dans server_name ET
# dans les chemins des certificats ci-dessous.
# =============================================================================

# -----------------------------------------------------------------------------
# Bloc HTTP (port 80)
#   - Sert le challenge ACME (HTTP-01) de certbot pour l'émission/renouvellement.
#   - Redirige tout le reste vers HTTPS.
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name parc.medicofi.fr;

    # Webroot utilisé par certbot pour le challenge HTTP-01 (voir deploy/README.md).
    # Le volume « certbot-www » est partagé entre l'hôte/certbot et ce conteneur.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste est redirigé en HTTPS (301 permanent).
    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# Bloc HTTPS (port 443) — trafic applicatif chiffré
# -----------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name parc.medicofi.fr;

    # --- Certificats Let's Encrypt --------------------------------------------
    # Générés par certbot sur l'hôte dans /etc/letsencrypt (monté en lecture seule).
    # Adaptez le sous-dossier au domaine effectivement émis par certbot.
    ssl_certificate     /etc/letsencrypt/live/parc.medicofi.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/parc.medicofi.fr/privkey.pem;

    # --- Paramètres TLS modernes ----------------------------------------------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- HSTS : force HTTPS côté navigateur pendant 2 ans (avec sous-domaines) -
    # N'activez le « preload » qu'une fois certain que tous les sous-domaines
    # servent bien en HTTPS.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # --- En-têtes de sécurité complémentaires ---------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Taille maximale du corps de requête ----------------------------------
    # Le stdout/stderr renvoyé par une commande peut être volumineux ; le serveur
    # tronque à 1 Mo par flux. On autorise ~2 Mo pour couvrir les deux flux + JSON.
    client_max_body_size 2m;

    # --- Relais WebSocket bureau à distance -----------------------------------
    # Les deux participants d'une session (agent et viewer) se connectent ici :
    #   wss://<host>/ws/remote/agent?token=...
    #   wss://<host>/ws/remote/viewer?token=...
    # Proxifié vers le conteneur « relay » (asyncio websockets, port 8765).
    # La mise à niveau HTTP -> WebSocket exige HTTP/1.1 + en-têtes Upgrade/Connection.
    # Cette location plus spécifique est prioritaire sur « location / » (plus long préfixe).
    location /ws/remote/ {
        proxy_pass http://relay:8765;
        proxy_http_version 1.1;

        # Négociation du protocole WebSocket (handshake « 101 Switching Protocols »).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Transmission des informations d'origine au relais.
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Connexions longue durée : une session de bureau à distance peut durer
        # de longues minutes sans coupure ; on laisse le tunnel ouvert jusqu'à 1 h.
        proxy_connect_timeout 10s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;

        # Pas de mise en mémoire tampon : on relaie les trames au fil de l'eau.
        proxy_buffering off;
    }

    # --- Reverse proxy vers l'application Flask (gunicorn) --------------------
    location / {
        proxy_pass http://web:8000;
        proxy_http_version 1.1;

        # Transmission des informations d'origine au backend Flask.
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Délais adaptés à l'exécution de commandes à distance (timeout agent 120 s).
        proxy_connect_timeout 10s;
        proxy_send_timeout    150s;
        proxy_read_timeout    150s;
    }
}
