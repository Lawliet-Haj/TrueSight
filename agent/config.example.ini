# ============================================================================
# ParcVue - Agent Windows : fichier de configuration d'exemple
# ----------------------------------------------------------------------------
# Copier ce fichier sous C:\ProgramData\ParcVue\config.ini en production
# (il est poussé par GPO). En développement, le placer dans le dossier courant.
# ============================================================================

[server]
# URL de base du serveur ParcVue (HTTPS obligatoire en production).
url = https://parc.medicofi.fr
# Secret d'enrôlement partagé, échangé une seule fois contre un token unique.
enrollment_token = <shared secret>
# Vérification du certificat TLS. Mettre à false UNIQUEMENT en développement.
verify_tls = true

[agent]
# Intervalle (secondes) entre deux heartbeats (métriques live).
heartbeat_interval = 45
# Intervalle (secondes) entre deux interrogations de la file de commandes.
command_poll_interval = 8
# Intervalle (heures) entre deux collectes d'inventaire matériel + logiciel.
inventory_interval_hours = 12
