# =============================================================================
# ParcVue — Orchestration Docker Compose (production VPS)
# -----------------------------------------------------------------------------
# Quatre services :
#   - db    : PostgreSQL 16 (stockage inventaire, métriques, commandes, audit)
#   - web   : application Flask servie par gunicorn (API + dashboard)
#   - relay : relais WebSocket asyncio (bureau à distance — appariement agent/viewer)
#   - nginx : reverse proxy TLS (terminaison HTTPS, redirection HTTP -> HTTPS)
#
# Démarrage : docker compose up -d   (après avoir rempli le fichier .env)
# Voir deploy/README.md pour la procédure complète (VPS + certbot).
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Base de données PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16
    container_name: parcvue-db
    restart: unless-stopped
    environment:
      # Ces valeurs doivent rester cohérentes avec DATABASE_URL dans .env
      POSTGRES_USER: parcvue
      POSTGRES_PASSWORD: parcvue
      POSTGRES_DB: parcvue
    volumes:
      # Volume nommé : les données survivent aux recréations de conteneur
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # Le service web n'attend que lorsque Postgres répond réellement
      test: ["CMD-SHELL", "pg_isready -U parcvue -d parcvue"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Pas de ports exposés vers l'hôte : la base reste interne au réseau Compose
    networks:
      - parcvue

  # ---------------------------------------------------------------------------
  # Application Flask (API agent + API dashboard + pages HTML), via gunicorn
  # ---------------------------------------------------------------------------
  web:
    build: ./server
    container_name: parcvue-web
    restart: unless-stopped
    depends_on:
      db:
        # Attend que le healthcheck de la base soit « healthy »
        condition: service_healthy
    env_file:
      # Toutes les variables de configuration (voir .env.example)
      - .env
    expose:
      # Port interne uniquement : seul nginx y accède (pas publié sur l'hôte)
      - "8000"
    networks:
      - parcvue

  # ---------------------------------------------------------------------------
  # Relais WebSocket (bureau à distance) — asyncio + lib « websockets »
  # ---------------------------------------------------------------------------
  # Conteneur dédié : gunicorn (sync) ne gère pas bien le WebSocket long-vivant,
  # on isole donc le relais. Il apparie 1 agent + 1 viewer par session, relaie
  # les trames sans transformation et valide les jetons directement en base
  # (lecture SQL simple via DATABASE_URL, pas d'ORM).
  relay:
    build: ./relay
    container_name: parcvue-relay
    restart: unless-stopped
    depends_on:
      db:
        # Le relais lit remote_sessions : il attend que la base soit « healthy »
        condition: service_healthy
    env_file:
      # Partage la MÊME configuration que « web » ; seul DATABASE_URL est requis
      # côté relais (validation des jetons de session).
      - .env
    expose:
      # Port interne uniquement : seul nginx y accède (pas publié sur l'hôte).
      # Nginx proxifie /ws/remote/ vers http://relay:8765 (mise à niveau WebSocket).
      - "8765"
    networks:
      - parcvue

  # ---------------------------------------------------------------------------
  # Reverse proxy Nginx (TLS / Let's Encrypt)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: parcvue-nginx
    restart: unless-stopped
    depends_on:
      - web
      - relay
    ports:
      - "80:80"     # HTTP : sert le challenge ACME puis redirige vers HTTPS
      - "443:443"   # HTTPS : trafic applicatif chiffré
    volumes:
      # Configuration du reverse proxy (lecture seule)
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Certificats Let's Encrypt gérés par certbot sur l'hôte (lecture seule)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Racine web pour le challenge HTTP-01 d'ACME (renouvellement certbot)
      - certbot-www:/var/www/certbot
    networks:
      - parcvue

# -----------------------------------------------------------------------------
# Volumes nommés
# -----------------------------------------------------------------------------
volumes:
  pgdata:          # Données PostgreSQL persistantes
  certbot-www:     # Webroot partagé pour le challenge ACME (certbot)

# -----------------------------------------------------------------------------
# Réseau interne dédié
# -----------------------------------------------------------------------------
networks:
  parcvue:
    driver: bridge
