# =============================================================================
# TrueSight — reverse proxy de TEST (HTTP simple, PAS de TLS)
# -----------------------------------------------------------------------------
# Écoute en interne sur le port 80 du conteneur (publié sur l'hôte en 8080).
# Proxifie l'application Flask et le relais WebSocket du bureau à distance.
# Pour la production (HTTPS/Let's Encrypt), voir deploy/nginx.conf.
# =============================================================================

server {
    listen 80;
    server_name _;

    # Tolère la sortie des commandes distantes (tronquée à ~1 Mo côté serveur).
    client_max_body_size 4m;

    # --- Bureau à distance : WebSocket -> relais ---
    location /ws/remote/ {
        proxy_pass http://relay:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;   # $http_host conserve le port (ex. :8080) -> ws_url correct
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # --- Application Flask (API agent + API dashboard + pages) ---
    location / {
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;   # $http_host conserve le port (ex. :8080) -> ws_url correct
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
